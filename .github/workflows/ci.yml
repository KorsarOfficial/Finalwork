name: Django CI/CD

on: [push, pull_request]

env:
  DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}  # Секретный ключ Django (хранится в GitHub Secrets)
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: 5432
  POSTGRES_DB: finalwork

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest  # Запускаем job на последней версии Ubuntu

    steps:
      - name: Check out code
        uses: actions/checkout@v3  # Клонируем репозиторий

      - name: Set up Python
        uses: actions/setup-python@v4  # Устанавливаем Python
        with:
          python-version: '3.11'  # Указываем версию Python

      - name: Install dependencies
        run: |  # Выполняем команды в shell
          python -m pip install --upgrade pip  # Обновляем pip
          pip install flake8  # Устанавливаем flake8

      - name: Run Flake8
        run: flake8 .  # Запускаем flake8 для проверки стиля кода

  test:
    name: Run Tests
    runs-on: ubuntu-latest  # Запускаем job на последней версии Ubuntu
    needs: lint  # Запускаем этот job только после успешного завершения job lint

    services:
      postgres:
        image: postgres:15  # Используем образ PostgreSQL 15
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }} # Используем переменные окружения
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432  # Маппим порт 5432 внутри контейнера на порт 5432 на хосте
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5 # Проверяем, что PostgreSQL готов

    steps:
      - name: Check out code
        uses: actions/checkout@v3  # Клонируем репозиторий

      - name: Set up Python
        uses: actions/setup-python@v4  # Устанавливаем Python
        with:
          python-version: '3.11'  # Указываем версию Python

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |  # Выполняем команды в shell
          python -m pip install --upgrade pip  # Обновляем pip
          pip install -r requirements.txt  # Устанавливаем зависимости из requirements.txt

      - name: Wait for PostgreSQL
        run: sleep 10  # Ждем, пока PostgreSQL запустится

      - name: Run migrations
        run: python manage.py migrate  # Применяем миграции Django

      - name: Run tests
        run: coverage run manage.py test # Запускаем тесты с измерением покрытия кода
      - name: Generate coverage report
        run: coverage xml

      - name: Generate coverage report
        run: coverage report -m

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest  # Запускаем job на последней версии Ubuntu
    needs: test  # Запускаем этот job только после успешного завершения job test

    steps:
      - name: Check out code
        uses: actions/checkout@v3  # Клонируем репозиторий

      - name: Log in to Docker Hub
        run: echo ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }} | docker login -u ${{ secrets.DOCKER_HUB_USERNAME }} --password-stdin  # Авторизуемся в Docker Hub

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/task_tracker:${{ github.sha }} .  # Собираем Docker image

      - name: Push Docker image to Docker Hub
        run: docker push ${{ secrets.DOCKER_HUB_USERNAME }}/task_tracker:${{ github.sha }}  # Отправляем Docker image в Docker Hub
